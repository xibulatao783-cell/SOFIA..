<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sia ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- STEP 1: THE QUESTION -->
    <div id="step1" class="container">
        <img src="https://giphy.com" class="cute-gif">
        <h1 id="questionText">Do you love me? ❤️</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="showSection('step2')">YES</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">NO</button>
        </div>
    </div>

    <!-- STEP 2: GIFT SELECTION -->
    <div id="step2" class="container hidden">
        <h2 style="font-family: 'Dancing Script', cursive; font-size: 32px; color: #0369a1;">I knew you'd say yes 💕</h2>
        <div class="gift-grid">
            <div class="gift-box" onclick="showSection('gift1')"><span>🖼️</span><div class="gift-label">MEMORIES</div></div>
            <div class="gift-box" onclick="showSection('gift2')"><span>🎵</span><div class="gift-label">OUR SONG</div></div>
            <div class="gift-box" onclick="showSection('gift3')"><span>✉️</span><div class="gift-label">MESSAGE</div></div>
        </div>
    </div>

    <!-- GIFT 1: PHOTOS -->
    <div id="gift1" class="container hidden">
        <h2 style="font-family: 'Georgia', serif; font-style: italic; color: #0369a1;">Captured memories</h2>
        <div class="gallery-wrapper">
            <!-- Palitan ang photo1.jpg, etc. ng pictures mo sa folder -->
            <div class="photo-frame"><img src="photo1.jpg" alt="1"></div>
            <div class="photo-frame"><img src="photo2.jpg" alt="2"></div>
            <div class="photo-frame"><img src="photo3.jpg" alt="3"></div>
        </div>
        <button class="back-btn" onclick="showSection('step2')">Back to Gifts</button>
    </div>

    <!-- GIFT 2: MUSIC PLAYER (Taylor Swift) -->
    <div id="gift2" class="container hidden">
        <div class="player-card">
            <div class="vinyl-disk" id="disk">
                <div class="vinyl-center"></div>
            </div>
            <div class="player-info">
                <p class="dedication">REMIND ME OF US</p>
                <h3 class="song-title">Snow on the Beach</h3>
                <p class="artist-name">Taylor Swift</p>
                <!-- Dito papasok ang YouTube Player via JS -->
                <div id="player-container">
                    <div id="player"></div>
                </div>
            </div>
        </div>
        <button class="back-btn" onclick="showSection('step2')">Back to Gifts</button>
    </div>

    <!-- GIFT 3: MESSAGE -->
    <div id="gift3" class="container hidden">
        <div class="message-card">
            <h2 style="font-family: 'Dancing Script', cursive; color: #0ea5e9;">To Sia,</h2>
            <div id="typewriter" class="message-text"></div>
            <div class="signature">Love you always ❤️</div>
        </div>
        <button class="back-btn" onclick="showSection('step2')">Back to Gifts</button>
    </div>

    <!-- SCRIPTS -->
    <script src="https://youtube.com"></script>
    <script src="script.js"></script>
</body>
</html>
